<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONG Cães</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="titulo">
        <center>
            <h1>Adote seu cãozinho</h1>
        </center>
    </div>

    <br>
    <br>
    <br>

    <center><div class="formulario">

        <h2>Formulário de Adoção</h2>


        <form id="formAdocao">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome">
            <br>
            <br>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Digite seu email">
            <br>
            <br>

            <label for="telefone">Telefone:</label>
            <input type="telefone" id="telefone" placeholder="Digite seu Telefone">
            <br>
            <br>

            <label for="cpf">CPF:</label>
            <input type="cpf" id="cpf" placeholder="Digite seu CPF">
            <br>
            <br>


            <label for="idade">Idade:</label>
            <input type="idade" id="idade" placeholder="Digite sua Idade">
            <br>
            <br>

            <label for="cidade">Cidade:</label>
            <input type="cidade" id="cidade" placeholder="Digite sua Cidade">
            <br>
            <br>

            <label for="moradia">Moradia:</label>
            <select name="moradia" id="moradia">
                <option value=""> Selecione</option>
                <option value="casa"> Casa</option>
                <option value="apartamento"> Apartamento</option>
            </select>

            <br>
            <br>

            <label for="quintal">Possui Quintal?</label>
            <input type="radio" name="quintal" value="sim">Sim
            <input type="radio" name="quintal" value="nao">Não
            <br>
            <br>

            <label for="animal">Já teve animal antes?</label>
            <input type="radio" name="animal" value="sim">Sim
            <input type="radio" name="animal" value="nao">Não
            <br>
            <br>

            <label for="sozinho">Quanto tempo o animal ficará sozinho?:</label>
            <input type="sozinho" id="sozinho" placeholder="Digite quanto tempo">
            <br>
            <br>

             <label for="motivo">Qual o motivo da adoção?:</label>
            <input type="motivo" id="motivo" placeholder="Digite o motivo aqui">
            <br>
            <br>

             <label for="termos">aceita os termos de responsabilidade?:</label>
             <input type="radio" name="termos" value="aceito">Aceito
            <br>
            <br>

             


            <button type="submit">Enviar</button>


        </form>

    </div></center>

    <div id="resultado"></div>

    <script src="scripts/script.js"></script>



</body>

</html>
